name: kidlearn_play
version: 0.0.1
publish_to: 'none'
description: KidLearn Play - Interactive Learning Game for Kids

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.0.0
  lottie: ^2.3.2
  rive: ^0.12.3
  cupertino_icons: ^1.0.2
  http: ^1.1.0
  audioplayers: ^5.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/animations/
    - assets/sounds/
    - assets/images/
